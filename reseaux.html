<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nos réseaux</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #ff4fd8 0%, #7b00ff 35%, #14001d 100%);
      color: white;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .phone-wrap {
      width: 100%;
      max-width: 430px;
    }

    .title {
      text-align: center;
      font-size: 2rem;
      margin: 20px 0 18px;
      font-weight: 800;
      text-shadow: 0 0 12px rgba(255,255,255,.2);
    }

    .box {
      background: rgba(20, 0, 30, 0.72);
      border: 2px solid rgba(255, 80, 210, 0.45);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 0 20px rgba(255, 0, 170, 0.25);
      backdrop-filter: blur(6px);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .social {
      text-decoration: none;
      color: white;
      text-align: center;
    }

    .icon {
      height: 82px;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: bold;
      border: 2px solid rgba(255,255,255,.18);
      box-shadow: inset 0 0 16px rgba(255,255,255,.08);
      margin-bottom: 8px;
    }

    .ig { background: linear-gradient(135deg, #b84dff, #7b2cff); }
    .tt { background: linear-gradient(135deg, #173dff, #001eff); }
    .tg { background: linear-gradient(135deg, #2d8cff, #1662ff); }
    .wa { background: linear-gradient(135deg, #b84dff, #7b2cff); }
    .mail { background: linear-gradient(135deg, #ffcc33, #f0a000); }
    .chat { background: linear-gradient(135deg, #2d8cff, #1662ff); }

    .social span {
      display: block;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .separator {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 22px 0;
      color: #ffd2f3;
      font-weight: 700;
      justify-content: center;
    }

    .separator::before,
    .separator::after {
      content: "";
      flex: 1;
      height: 2px;
      background: linear-gradient(to right, transparent, #ff67da, transparent);
    }

    .secure-card {
      position: relative;
      overflow: hidden;
      border-radius: 22px;
      border: 2px solid rgba(255, 80, 210, 0.45);
      min-height: 290px;
      background:
        linear-gradient(rgba(15,0,25,.35), rgba(15,0,25,.72)),
        url("logo.jpg") center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      box-shadow: 0 0 20px rgba(255, 0, 170, 0.2);
    }

    .secure-content {
      max-width: 290px;
    }

    .lock {
      width: 52px;
      height: 52px;
      margin: 0 auto 14px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 0, 140, 0.2);
      border: 1px solid rgba(255,255,255,.2);
      font-size: 1.5rem;
    }

    .secure-title {
      color: #ff7adf;
      font-weight: 900;
      letter-spacing: 2px;
      margin-bottom: 10px;
      font-size: 1.2rem;
    }

    .secure-text {
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 10px;
    }

    .small {
      color: #f0dff2;
      line-height: 1.45;
      font-size: 1rem;
    }

    @media (max-width: 480px) {
      .title { font-size: 1.7rem; }
      .icon { height: 72px; font-size: 1.6rem; }
      .social span { font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <div class="phone-wrap">
    <div class="title">Retrouvez-nous sur</div>

    <div class="box">
      <div class="grid">
        <a class="social" href="https://instagram.com" target="_blank">
          <div class="icon ig">IG</div>
          <span>Instagram</span>
        </a>

        <a class="social" href="https://tiktok.com" target="_blank">
          <div class="icon tt">TT</div>
          <span>TikTok</span>
        </a>

        <a class="social" href="https://telegram.org" target="_blank">
          <div class="icon tg">TG</div>
          <span>Telegram</span>
        </a>

        <a class="social" href="https://whatsapp.com" target="_blank">
          <div class="icon wa">WA</div>
          <span>WhatsApp</span>
        </a>

        <a class="social" href="mailto:contact@monsite.com">
          <div class="icon mail">@</div>
          <span>Email</span>
        </a>

        <a class="social" href="#">
          <div class="icon chat">💬</div>
          <span>Support</span>
        </a>
      </div>
    </div>

    <div class="separator">OU</div>

    <div class="secure-card">
      <div class="secure-content">
        <div class="lock">🔒</div>
        <div class="secure-title">ACCÈS SÉCURISÉ</div>
        <div class="secure-text">
          Contactez le support pour obtenir votre code d’accès.
        </div>
        <div class="small">
          Sans celui-ci, la connexion est limitée.
        </div>
      </div>
    </div>
  </div>
</body>
</html>

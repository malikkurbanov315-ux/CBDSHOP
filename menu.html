<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #ff4fd8 0%, #7b00ff 35%, #14001d 100%);
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      padding: 20px;
    }

    .box {
      max-width: 420px;
      width: 100%;
      padding: 28px;
      border-radius: 22px;
      background: rgba(20, 0, 30, 0.72);
      border: 2px solid rgba(255, 80, 210, 0.45);
      box-shadow: 0 0 20px rgba(255, 0, 170, 0.25);
    }

    h1 {
      margin-bottom: 14px;
    }

    p {
      opacity: 0.95;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Bienvenue sur le menu</h1>
    <p>Ici tu mettras ton vrai contenu plus tard.</p>
  </div>
</body>
</html>

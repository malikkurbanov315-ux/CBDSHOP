<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Montserrat', Arial, Helvetica, sans-serif;
  }

  body {
    min-height: 100vh;
    background:
      linear-gradient(rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.10)),
      url("medailleuse.png") center center / cover no-repeat,
      radial-gradient(circle at top, #8c5fa3 0%, #3d214d 45%, #140818 100%);
    color: #f2d57a;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .container {
    width: 100%;
    max-width: 430px;
    background: rgba(255, 245, 250, 0.22);
    border: 1px solid rgba(255, 255, 255, 0.38);
    border-radius: 24px;
    padding: 28px 22px;
    box-shadow:
      0 0 30px rgba(255, 255, 255, 0.14),
      inset 0 0 20px rgba(255, 255, 255, 0.10);
    text-align: center;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }

  .logo-box {
    width: 190px;
    height: 190px;
    margin: 0 auto 18px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.18);
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.12);
    overflow: hidden;
    padding: 4px;
    border: 1px solid rgba(255, 255, 255, 0.24);
  }

  .logo-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 16px;
  }

  h1 {
    font-size: 2.1rem;
    color: #d4af37;
    margin-bottom: 10px;
    font-family: 'Cinzel Decorative', serif;
    letter-spacing: 1px;
    line-height: 1.2;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.45);
  }

  .subtitle {
    color: #f4d97c;
    font-weight: 700;
    margin-bottom: 18px;
    font-size: 1rem;
    text-shadow: 0 1px 3px rgba(0, 0, 0, 0.35);
  }

  .desc {
    color: #fff3c4;
    line-height: 1.7;
    font-size: 0.98rem;
    font-weight: 500;
    margin-bottom: 20px;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.28);
  }

  .separator {
    width: 70px;
    height: 3px;
    margin: 18px auto;
    background: linear-gradient(to right, transparent, rgba(212, 175, 55, 0.95), transparent);
    border-radius: 99px;
  }

  .service-box {
    border: 1px solid rgba(212, 175, 55, 0.25);
    border-radius: 16px;
    padding: 18px;
    text-align: left;
    margin-bottom: 22px;
    background: rgba(255, 255, 255, 0.14);
  }

  .service-box h3 {
    color: #f0c95a;
    margin-bottom: 10px;
    font-size: 1rem;
    font-weight: 700;
    text-shadow: 0 1px 3px rgba(0, 0, 0, 0.35);
  }

  .service-box ul {
    padding-left: 18px;
    margin-bottom: 14px;
    color: #fff3c4;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
  }

  .service-box li {
    margin-bottom: 6px;
    line-height: 1.6;
    font-weight: 500;
  }

  .footer-text {
    font-style: italic;
    font-weight: 600;
    line-height: 1.7;
    margin-bottom: 18px;
    color: #fff0b3;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.28);
  }

  .direction {
    color: #f0c95a;
    margin-bottom: 18px;
    font-weight: 700;
    text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
  }

  .enter-btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 999px;
    background: linear-gradient(90deg, rgba(212, 175, 55, 0.85), rgba(255, 223, 120, 0.95));
    color: #2b1800;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(212, 175, 55, 0.22);
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    text-shadow: 0 1px 2px rgba(255, 255, 255, 0.2);
  }

  .enter-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 26px rgba(212, 175, 55, 0.34);
    background: linear-gradient(90deg, rgba(224, 186, 64, 0.95), rgba(255, 231, 150, 1));
  }

  @media (max-width: 480px) {
    h1 {
      font-size: 1.7rem;
    }

    .container {
      padding: 22px 16px;
    }

    .logo-box {
      width: 170px;
      height: 170px;
    }
  }
</style>

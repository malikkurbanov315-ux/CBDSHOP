<script>
  function goToSite() {
    const code = document.getElementById("codeInput").value.trim();
    const message = document.getElementById("message");

    const bonCode = "LVE31";
    const urlDeRedirection = "https://tonsite.com";

    if (!code) {
      message.textContent = "Merci d’entrer un code.";
      return;
    }

    if (code !== bonCode) {
      message.textContent = "Code incorrect.";
      return;
    }

    window.location.href = urlDeRedirection;
  }
</script>
